task_id: cpc-camp-2026-summary-distributed
description: |
  CPC Spring Camp 2026（集合的予測符号化と記号創発システムに関する研究合宿）の
  日別メモの一部を担当し、合宿全体のまとめドキュメントを作成してください。

  各エージェントは合宿の一日分のメモのみを持っています。

  ## 手順
  1. あなたの担当日のファイル（/workspace/ 内、specialization で指定された日）を読んでください。
     例: specialization="day1" なら /workspace/day1.md です。
     他の日のファイルは読まないでください。
  2. この合宿はどのようなものだったか、仮説を立ててください。
     現在の共有まとめがある場合はそれも参考にしてください。
  3. 合宿全体のまとめドキュメントを markdown で作成してください。
     一日分しか見ていませんが、共有まとめから得た情報も統合して、
     できる限り合宿全体を捉えたまとめを書いてください。

initial_w: ""
docker_image: cpc-task-distributed:latest
max_rounds: 20
agent_specializations:
  - "day1"
  - "day2"
  - "day3"
  - "day4"
  - "day5"
